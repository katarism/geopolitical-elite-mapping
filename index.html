<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地缘政治精英网络图谱工具</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #181b25;
            --accent: #3b82f6;
            --text: #e0e0e0;
            --text-dim: #8a8fa0;
            --border: #2a2e3a;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
            text-align: left;
        }
        .feature-item {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .feature-item h3 {
            font-size: 0.9rem;
            margin: 0 0 5px 0;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .feature-item p {
            font-size: 0.85rem;
            margin: 0;
            color: var(--text-dim);
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            background: #2563eb;
        }
        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--border);
        }
        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        @media(max-width: 600px) {
            body { padding: 12px; }
            .container { padding: 24px 16px; border-radius: 12px; }
            h1 { font-size: 1.6rem; }
            p.subtitle { font-size: 0.95rem; margin-bottom: 1.2rem; }
            .features { grid-template-columns: 1fr; gap: 12px; margin-bottom: 1.2rem; }
            .feature-item { padding: 12px; }
            .feature-item h3 { font-size: 0.8rem; }
            .feature-item p { font-size: 0.8rem; }
            .button-group { flex-direction: column; gap: 10px; }
            .btn { padding: 12px 20px; font-size: 0.9rem; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>地缘政治精英网络图谱工具</h1>
        <p class="subtitle">专业的精英网络映射、置信度审计与交互式可视化工具包</p>
        
        <div class="features">
            <div class="feature-item">
                <h3>时代纪元分析</h3>
                <p>支持 4 阶段纪元切片（1945-2026），动态追踪权力杠杆的转移。</p>
            </div>
            <div class="feature-item">
                <h3>交互式 UI</h3>
                <p>支持 Cytoscape.js 渲染，可按时代纪元、阵营、置信度多维筛选。</p>
            </div>
            <div class="feature-item">
                <h3>置信度审计</h3>
                <p>视觉编码置信度级别，确保研究的严谨性与诚实性。</p>
            </div>
            <div class="feature-item">
                <h3>完全离线</h3>
                <p>查看器所有依赖项均已内联，无需网络环境即可运行。</p>
            </div>
        </div>

        <div class="button-group">
            <a href="Examples/MiddleEastOil/MiddleEastOil_EliteNetwork_Viewer.html" class="btn btn-primary">查看中东石油示例演示</a>
            <a href="https://github.com/katarism/geopolitical-elite-mapping" class="btn btn-secondary">GitHub 仓库</a>
        </div>

        <footer>
            <p>© 2026 Geopolitical Elite Mapping Projects. 基于 MIT 协议开源。</p>
        </footer>
    </div>
</body>
</html>
